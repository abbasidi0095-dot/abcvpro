# fly.toml app configuration file generated for abcv-app on 2026-07-03T23:45:33Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'abcv-app'
primary_region = 'ams'
kill_signal = 'SIGINT'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
