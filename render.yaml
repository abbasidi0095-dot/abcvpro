databases:
  - name: abcv-db
    plan: free
    databaseName: abcv
    user: abcv

services:
  - type: web
    name: abcv
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    autoDeploy: true
    preDeployCommand: prisma migrate deploy
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: abcv-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: GEMINI_BASE_URL
        value: https://generativelanguage.googleapis.com/v1beta/openai/
      - key: GEMINI_MODEL
        value: gemini-3-flash-preview
      - key: PUPPETEER_SKIP_DOWNLOAD
        value: "true"
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /app/chrome-bin/chrome-headless-shell-linux64/chrome-headless-shell